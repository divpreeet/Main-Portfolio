<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>divpreet</title>
    <script>
    (function(){
        var img=new Image();
        img.onload=function(){
            var s=16,c=document.createElement('canvas'),ctx;
            c.width=s;c.height=s;ctx=c.getContext('2d');
            ctx.imageSmoothingEnabled=false;
            ctx.drawImage(img,0,0,s,s);
            var d=ctx.getImageData(0,0,s,s),p=d.data;
            for(var i=0;i<p.length;i+=4){
                var g=p[i]*0.3+p[i+1]*0.59+p[i+2]*0.11;
                var v=g>128?255:0;
                p[i]=v;p[i+1]=v;p[i+2]=v;
            }
            ctx.putImageData(d,0,0);
            var l=document.createElement('link');
            l.rel='icon';l.href=c.toDataURL();
            document.head.appendChild(l);
        };
        img.src='shrek.png';
    })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://pagering.gideon.sh/embed.js"></script>
    <script type="module" src="script.js"></script>
</head>
<body>
    <canvas id="shrek-canvas"></canvas>
    <main>
        <header>
            <h1>divpreet</h1>
            <p class="tagline">currently doing nothing</p>
        </header>

        <nav class="social-links">
            <a href="https://github.com/divpreeet" target="_blank" rel="noopener noreferrer">github</a>
            <a href="https://hackclub.slack.com/team/U0801PU0MTQ" target="_blank" rel="noopener noreferrer">slack</a>
        </nav>

        <nav class="section-nav">
            <button data-section="about">about</button>
            <button data-section="projects">projects</button>
            <button data-section="blog">blog</button>
        </nav>

        <div id="content"></div>

        <footer>
            <div id="badges"></div>
            <div class="footer-meta">
                <pagering-link theme="dark"></pagering-link>
                <span class="built">built 2026</span>
            </div>
        </footer>
    </main>
</body>
</html>
